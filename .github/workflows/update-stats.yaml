name: Update GitHub stats card

on:
  schedule:
    # todo dia às 05:00 UTC (~02:00 no horário de Pernambuco)
    - cron: "0 5 * * 1"
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Update stats
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
          GH_USERNAME: heytulio
          SVG_PATHS: "dark_mode.svg,light_mode.svg"
        run: python scripts/update_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git diff --staged --quiet && echo "Nada mudou" || git commit -m "chore: update github stats cards [skip ci]"
          git push
