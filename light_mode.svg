        <tspan x="620" class="label">Commits:</tspan>
        <tspan x="700" id="stat-commits" class="value">85</tspan>
    </text>
    <text y="408" class="line">
        <tspan x="380" class="label">Lines of Code</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" id="stat-loc" class="value">25.998 (+24.320 / -1.678)</tspan>
    </text>

    <!-- Contact header -->
    <text x="380" y="434">
        <tspan class="header" fill="#0969da">Contact</tspan>
        <tspan class="dash"> ───────────────────────────────────</tspan>
    </text>

    <text y="460" class="line">
        <tspan x="380" class="label">LinkedIn</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" class="value">linkedin.com/in/tulio-vasc</tspan>
    </text>
    <text y="480" class="line">
        <tspan x="380" class="label">Email</tspan>
        <tspan x="480" class="dots">:</tspan>
        <tspan x="500" class="value">contato.tuliov@outlook.com</tspan>
    </text>

    <!-- Prompt / cursor -->
    <text x="380" y="504" class="line">
        <tspan fill="#57606a">tulio@heytulio</tspan>
        <tspan class="dots">:~$ </tspan>
        <tspan fill="#24292f">_</tspan>
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1.2s"
            repeatCount="indefinite" />
    </text>
</svg>