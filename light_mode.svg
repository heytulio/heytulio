<svg viewBox="0 0 920 580" xmlns="http://www.w3.org/2000/svg"
    font-family="'Cascadia Code','Fira Code',Consolas,'Courier New',monospace">
    <defs>
        <linearGradient id="artGrad" gradientUnits="userSpaceOnUse" x1="40" y1="80" x2="330" y2="345">
            <stop offset="0%" stop-color="#0891b2" />
            <stop offset="100%" stop-color="#4f46e5" />
        </linearGradient>
        <filter id="cardGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#1b1f24" flood-opacity="0.10" />
        </filter>
        <clipPath id="cardClip">
            <rect x="20" y="20" width="880" height="520" rx="16" />
        </clipPath>
        <style>
            .art {
                white-space: pre;
                font-family:
                    "Cascadia Mono",
                    "Fira Code",
                    Consolas,
                    monospace;
                font-size: 8.3px;
                fill: url(#artGrad);
            }

            .line {
                font-size: 13.5px;
            }

            .label {
                fill: #57606a;
                font-weight: 600;
            }

            .dots {
                fill: #d0d7de;
            }

            .value {
                fill: #24292f;
            }

            .header {
                font-size: 15px;
                font-weight: 700;
            }

            .dash {
                fill: #d0d7de;
                font-size: 15px;
            }

            .title {
                font-size: 12.5px;
                fill: #57606a;
                letter-spacing: .5px;
            }
        </style>
    </defs>

    <rect x="20" y="20" width="880" height="520" rx="16" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"
        filter="url(#cardGlow)" />

    <g clip-path="url(#cardClip)">
        <rect x="20" y="20" width="880" height="38" fill="#f6f8fa" />
        <line x1="20" y1="58" x2="900" y2="58" stroke="#d8dee4" stroke-width="1" />
        <circle cx="46" cy="39" r="6" fill="#ff5f56" />
        <circle cx="66" cy="39" r="6" fill="#ffbd2e" />
        <circle cx="86" cy="39" r="6" fill="#27c93f" />
        <text x="460" y="43.5" text-anchor="middle" class="title">tulio@heytulio — zsh</text>
    </g>

    <!-- ASCII Art: ornament/sphere with stars (source: asciiart.website/art/7058) -->
    <text x="40" y="140" class="art" xml:space="preserve">
        <tspan x="40" dy="0">                                              .</tspan>
        <tspan x="40" dy="1.2em">                       *</tspan>
        <tspan x="40" dy="1.2em">         .                       .                   .</tspan>
        <tspan x="40" dy="1.2em">                            .               ,"`.</tspan>
        <tspan x="40" dy="1.2em">  .                   _____                 `..'</tspan>
        <tspan x="40" dy="1.2em">                 _,odO8O8888bo._         .</tspan>
        <tspan x="40" dy="1.2em">              ,odOoOoOoOOOO8O888bo.                  *</tspan>
        <tspan x="40" dy="1.2em">      *     ,dOoOoOoOoOoOO8O8O88@8@b.           .</tspan>
        <tspan x="40" dy="1.2em">          ,d8o:o:o:o:o:ooOoOOOO8O88@8b.</tspan>
        <tspan x="40" dy="1.2em">         do:o:o:o:o:o:ooooOoOO8O88@8@@@b</tspan>
        <tspan x="40" dy="1.2em">.       do::.:.:.:.:.::o:ooooOOOO8888@@@b           .</tspan>
        <tspan x="40" dy="1.2em">       .o::::.:.:.:.::::o:ooOoOO8O88@@@@@. .</tspan>
        <tspan x="40" dy="1.2em">    .  |::.:.. . . ..:.::o:ooOoOO8O88@8@@|</tspan>
        <tspan x="40" dy="1.2em">       |o::.:.. . ..:.::o:ooOoOO8O88@8@@@|</tspan>
        <tspan x="40" dy="1.2em">       |::.:.. . . ..:.::o:ooOoOO8O88@8@@|</tspan>
        <tspan x="40" dy="1.2em">       'o::::.:.:.:.::::o:ooOoOO8O88@@@@@'     .         *</tspan>
        <tspan x="40" dy="1.2em">        Y8::.:.:.:.:.::o:ooooOOOO8888@@@P</tspan>
        <tspan x="40" dy="1.2em">        `Y8:o:o:o:o:o:ooooOoOO8O88@8@@@P'</tspan>
        <tspan x="40" dy="1.2em">          `Y:o:o:o:o:o:ooOoOOOO8O88@8@P     .        .</tspan>
        <tspan x="40" dy="1.2em"> .        . `YOoOoOoOoOoOO8O8O88@8@@P'</tspan>
        <tspan x="40" dy="1.2em">              `YoOoOoOoOOOO8O8888@P'     .</tspan>
        <tspan x="40" dy="1.2em">                 `"*YO8O8888@P*"'</tspan>
        <tspan x="40" dy="1.2em">        .                          *             .       .</tspan>
        <tspan x="40" dy="1.2em"></tspan>
        <tspan x="40" dy="1.2em">                             .                      .</tspan>
        <tspan x="40" dy="1.2em">    *            .                       .                </tspan>
    </text>

    <line x1="352" y1="90" x2="352" y2="520" stroke="#d8dee4" stroke-width="1" />

    <!-- Header -->
    <text x="380" y="110">
        <tspan class="header" fill="#1a7f37">tulio@heytulio</tspan>
        <tspan class="dash"> ────────────────────────────</tspan>
    </text>

    <!-- Info block -->
    <text y="136" class="line">
        <tspan x="380" class="label">Dev</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" class="value">Fullstack</tspan>
    </text>
    <text y="156" class="line">
        <tspan x="380" class="label">OS</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" class="value">Windows 11, Debian, Ubuntu</tspan>
    </text>
    <text y="176" class="line">
        <tspan x="380" class="label">Host</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" class="value">Intituto Federal de Pernambuco</tspan>
    </text>
    <text y="196" class="line">
        <tspan x="380" class="label">Kernel</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" class="value">System analysis and development</tspan>
    </text>
    <text y="216" class="line">
        <tspan x="380" class="label">Editor</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" class="value">VS Code</tspan>
    </text>
    <text y="236" class="line">
        <tspan x="380" class="label">Languages</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" class="value">JavaScript, TypeScript, Python</tspan>
    </text>
    <text y="256" class="line">
        <tspan x="380" class="label">Frameworks</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" class="value">Next.js, Nest.js, React</tspan>
    </text>
    <text y="276" class="line">
        <tspan x="380" class="label">Databases</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" class="value">PostgreSQL, MySQL, SQLite, MongoDB</tspan>
    </text>
    <text y="296" class="line">
        <tspan x="380" class="label">DevOps</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" class="value">Docker, Kubernetes (k8s, k3s)</tspan>
    </text>
    <text y="316" class="line">
        <tspan x="380" class="label">Hobbies</tspan>
        <tspan x="480" class="label">:</tspan>
        <tspan x="500" class="value">Games, Movies, Traveling</tspan>
    </text>

    <!-- GitHub Stats header -->
    <text x="380" y="342">
